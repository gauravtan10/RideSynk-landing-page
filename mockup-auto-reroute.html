<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RideSynk – Auto Reroute</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}

.phone{width:280px;height:580px;background:#0d0d16;border-radius:48px;border:2.5px solid #252535;position:relative;overflow:hidden;box-shadow:0 50px 120px rgba(0,0,0,0.95),0 0 0 1px #1a1a28,inset 0 1px 0 rgba(255,255,255,0.07),0 0 80px rgba(245,158,11,0.1);}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:26px;background:#0d0d16;border-radius:0 0 16px 16px;z-index:100;border:2.5px solid #252535;border-top:none;}
.phone-inner{width:100%;height:100%;overflow:hidden;border-radius:46px;position:relative;}

/* map */
.map{position:absolute;inset:0;background:linear-gradient(155deg,#1a2744 0%,#0f1e38 100%);}
.map-grid{position:absolute;inset:0;opacity:0.09;}

/* status bar */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:34px 22px 0;font-size:11px;font-weight:700;color:#fff;position:absolute;top:0;left:0;right:0;z-index:50;}

/* reroute banner */
.reroute-banner{position:absolute;top:60px;left:0;right:0;background:#d97706;padding:11px 18px;display:flex;align-items:center;gap:12px;z-index:25;}
.rb-icon{width:32px;height:32px;background:rgba(0,0,0,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rb1{font-size:11px;font-weight:800;color:#fff;}
.rb2{font-size:9px;color:rgba(255,255,255,0.75);margin-top:2px;}

/* catchup chip */
.catchup{position:absolute;top:124px;left:15px;right:15px;z-index:22;background:rgba(13,13,22,0.96);border-radius:14px;padding:11px 14px;border:1px solid #1e1e2e;display:flex;align-items:center;gap:11px;backdrop-filter:blur(10px);}
.cc-icon{width:34px;height:34px;background:#1d4ed8;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cc1{font-size:10.5px;font-weight:700;color:#fff;}
.cc2{font-size:9px;color:#3b82f6;margin-top:2px;}

/* route card */
.route-card{position:absolute;bottom:20px;left:15px;right:15px;z-index:22;background:rgba(13,13,22,0.97);border-radius:18px;padding:15px;border:1px solid #1e1e2e;backdrop-filter:blur(12px);}
.rc-title{font-size:10.5px;font-weight:800;color:#fff;margin-bottom:10px;letter-spacing:0.3px;}
.ro{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;margin-bottom:7px;}
.ro:last-child{margin-bottom:0;}
.ro.sel{background:#1d4ed8;}
.ro.alt{background:#141422;}
.ro-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.ro-n{font-size:10px;font-weight:700;color:#fff;}
.ro-d{font-size:8.5px;color:#6080b0;margin-top:2px;}
.ro-ck{color:#60a5fa;font-size:14px;margin-left:auto;}

/* spin animation for reroute icon */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 2s linear infinite;}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-inner">
    <!-- Map -->
    <div class="map">
      <svg class="map-grid" width="280" height="580" xmlns="http://www.w3.org/2000/svg">
        <defs><pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0L0 0 0 24" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs>
        <rect width="280" height="580" fill="url(#g)"/>
      </svg>
      <!-- Roads + routes -->
      <svg style="position:absolute;inset:0;" width="280" height="580">
        <!-- Road base group route -->
        <path d="M136,430 Q140,355 145,295 Q150,232 158,178 Q165,135 170,98" stroke="#1e2a50" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.45"/>
        <!-- Road base my route -->
        <path d="M88,460 Q72,385 78,320 Q88,255 108,208 Q130,162 152,140 Q162,124 170,98" stroke="#2a2215" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.45"/>

        <!-- Group route (blue solid) -->
        <path d="M136,430 Q140,355 145,295 Q150,232 158,178 Q165,135 170,98" stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
        <!-- My catch-up route (amber dashed) -->
        <path d="M88,460 Q72,385 78,320 Q88,255 108,208 Q130,162 152,140 Q162,124 170,98" stroke="#f59e0b" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-dasharray="10 6" opacity="0.95"/>

        <!-- Diverge point -->
        <circle cx="138" cy="358" r="7" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
        <!-- missed turn label -->
        <rect x="148" y="348" width="72" height="18" rx="5" fill="rgba(13,13,22,0.85)"/>
        <text x="184" y="361" text-anchor="middle" font-size="8" fill="#f59e0b" font-weight="700" font-family="sans-serif">missed turn</text>

        <!-- Destination -->
        <circle cx="170" cy="98" r="8" fill="#ef4444" stroke="#fff" stroke-width="2.5"/>
        <path d="M170,78 Q179,64 170,52 Q161,64 170,78Z" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>

        <!-- My position -->
        <circle cx="88" cy="460" r="9" fill="#0d0d16" stroke="#fff" stroke-width="2.5"/>
        <text x="88" y="464" text-anchor="middle" font-size="8" font-weight="800" fill="white" font-family="sans-serif">ME</text>

        <!-- Pack lead -->
        <circle cx="152" cy="196" r="8" fill="#2563eb" stroke="#93c5fd" stroke-width="2"/>
        <text x="152" y="199.5" text-anchor="middle" font-size="7.5" font-weight="800" fill="white" font-family="sans-serif">RK</text>

        <!-- Pack 2 -->
        <circle cx="155" cy="240" r="7" fill="#059669" stroke="#6ee7b7" stroke-width="1.8"/>
        <text x="155" y="243.5" text-anchor="middle" font-size="7" font-weight="800" fill="white" font-family="sans-serif">SM</text>

        <!-- Legend lines -->
        <line x1="20" y1="530" x2="44" y2="530" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
        <text x="48" y="534" font-size="8" fill="#6080b0" font-family="sans-serif">Pack route</text>
        <line x1="20" y1="548" x2="44" y2="548" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
        <text x="48" y="552" font-size="8" fill="#6080b0" font-family="sans-serif">Your catch-up</text>
      </svg>
    </div>

    <!-- Status bar -->
    <div class="sbar">
      <span>9:41</span>
      <div style="display:flex;gap:5px;align-items:center;">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="white"><rect x="0" y="6" width="3" height="4" rx="0.6"/><rect x="3.5" y="4" width="3" height="6" rx="0.6"/><rect x="7" y="2" width="3" height="8" rx="0.6"/><rect x="10.5" y="0" width="3" height="10" rx="0.6"/></svg>
        <span style="font-size:10px;font-weight:700;color:#fff;">84%</span>
      </div>
    </div>

    <!-- Reroute banner -->
    <div class="reroute-banner">
      <div class="rb-icon"><span class="spin">↺</span></div>
      <div>
        <div class="rb1">Auto Rerouting…</div>
        <div class="rb2">Catching up to your pack safely</div>
      </div>
    </div>

    <!-- Catch-up chip -->
    <div class="catchup">
      <div class="cc-icon">🏍️</div>
      <div>
        <div class="cc1">Pack is 2.4 km ahead</div>
        <div class="cc2">ETA to rejoin: ~6 min</div>
      </div>
    </div>

    <!-- Route options -->
    <div class="route-card">
      <div class="rc-title">Catch-up Routes</div>
      <div class="ro sel">
        <div class="ro-dot" style="background:#3b82f6;"></div>
        <div>
          <div class="ro-n">Via NH-48 Bypass</div>
          <div class="ro-d">18 km · 22 min · Fastest</div>
        </div>
        <div class="ro-ck">✓</div>
      </div>
      <div class="ro alt">
        <div class="ro-dot" style="background:#3a3a50;"></div>
        <div>
          <div class="ro-n">Via City Centre</div>
          <div class="ro-d">24 km · 34 min</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
