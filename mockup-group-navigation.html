<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RideSynk – Group Navigation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}

.phone{width:280px;height:580px;background:#0d0d16;border-radius:48px;border:2.5px solid #252535;position:relative;overflow:hidden;box-shadow:0 50px 120px rgba(0,0,0,0.95),0 0 0 1px #1a1a28,inset 0 1px 0 rgba(255,255,255,0.07),0 0 80px rgba(34,197,94,0.08);}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:26px;background:#0d0d16;border-radius:0 0 16px 16px;z-index:100;border:2.5px solid #252535;border-top:none;}
.phone-inner{width:100%;height:100%;overflow:hidden;border-radius:46px;position:relative;}

.screen-bg{position:absolute;inset:0;background:#08080f;}

/* status bar */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:34px 22px 0;font-size:11px;font-weight:700;color:#fff;position:absolute;top:0;left:0;right:0;z-index:50;}

/* header */
.hdr{position:absolute;top:60px;left:16px;right:16px;z-index:20;display:flex;align-items:center;gap:10px;}
.back-btn{width:34px;height:34px;background:#141422;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-name{font-size:13px;font-weight:800;color:#fff;}
.hdr-sub{font-size:9px;font-weight:400;color:#505070;margin-top:2px;}

/* members card */
.members-card{position:absolute;top:104px;left:16px;right:16px;z-index:20;background:#121220;border-radius:18px;border:1px solid #1e1e30;padding:12px 14px;}
.mem-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #141424;}
.mem-row:last-child{border-bottom:none;padding-bottom:0;}
.m-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.st-dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid #08080f;}
.st-live{background:#22c55e;}
.st-stale{background:#facc15;}
.st-off{background:#2a2a3e;}
.m-name{font-size:10.5px;font-weight:700;color:#fff;}
.m-bike{font-size:8.5px;color:#505070;margin-top:2px;}
.m-tag{font-size:8.5px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.t-live{background:rgba(34,197,94,0.14);color:#22c55e;}
.t-stale{background:rgba(250,204,21,0.12);color:#facc15;}
.t-off{background:#141422;color:#505070;}
.t-you{background:rgba(34,197,94,0.14);color:#22c55e;}

/* mini map */
.mini-map{position:absolute;bottom:18px;left:16px;right:16px;z-index:20;height:148px;background:linear-gradient(150deg,#1a2744,#0f1e38);border-radius:18px;overflow:hidden;border:1px solid #1e1e30;}
.mm-label{position:absolute;top:10px;left:13px;font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);}
.mm-live{position:absolute;top:10px;right:13px;background:#22c55e;border-radius:20px;padding:3px 9px;font-size:8px;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px;}
.mm-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0;}}

/* rider count badge */
.rider-badge{position:absolute;top:60px;right:16px;z-index:25;background:#22c55e;border-radius:20px;padding:4px 11px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px;}
.rb-pulse{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-inner">
    <div class="screen-bg"></div>

    <!-- Status bar -->
    <div class="sbar">
      <span>9:41</span>
      <div style="display:flex;gap:5px;align-items:center;">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="white"><rect x="0" y="6" width="3" height="4" rx="0.6"/><rect x="3.5" y="4" width="3" height="6" rx="0.6"/><rect x="7" y="2" width="3" height="8" rx="0.6"/><rect x="10.5" y="0" width="3" height="10" rx="0.6"/></svg>
        <span style="font-size:10px;font-weight:700;color:#fff;">84%</span>
      </div>
    </div>

    <!-- Header -->
    <div class="hdr">
      <div class="back-btn">
        <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M7 2L3 5L7 8" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="hdr-name">Ride Members</div>
        <div class="hdr-sub">Goa Weekend Ride</div>
      </div>
    </div>

    <!-- Live badge -->
    <div class="rider-badge"><div class="rb-pulse"></div> 4 Live</div>

    <!-- Members list -->
    <div class="members-card">
      <!-- Me -->
      <div class="mem-row">
        <div class="m-av" style="background:#0d0d16;border:2px solid #fff;">
          ME
          <div class="st-dot st-live"></div>
        </div>
        <div style="flex:1;">
          <div class="m-name">Gaurav T. <span style="color:#505070;font-weight:400;">(you)</span></div>
          <div class="m-bike">Triumph Tiger 900</div>
        </div>
        <div class="m-tag t-you">You · Live</div>
      </div>
      <!-- Rider 1 -->
      <div class="mem-row">
        <div class="m-av" style="background:#2563eb;">
          RK
          <div class="st-dot st-live"></div>
        </div>
        <div style="flex:1;">
          <div class="m-name">Rahul Kumar</div>
          <div class="m-bike">Royal Enfield 650 · 62 km/h</div>
        </div>
        <div class="m-tag t-live">Live</div>
      </div>
      <!-- Rider 2 -->
      <div class="mem-row">
        <div class="m-av" style="background:#059669;">
          SM
          <div class="st-dot st-live"></div>
        </div>
        <div style="flex:1;">
          <div class="m-name">Sarah M.</div>
          <div class="m-bike">KTM Duke 390 · 58 km/h</div>
        </div>
        <div class="m-tag t-live">Live</div>
      </div>
      <!-- Rider 3 stale -->
      <div class="mem-row">
        <div class="m-av" style="background:#44445a;">
          AV
          <div class="st-dot st-stale"></div>
        </div>
        <div style="flex:1;">
          <div class="m-name">Arjun V.</div>
          <div class="m-bike">Bajaj Dominar 400</div>
        </div>
        <div class="m-tag t-stale">5 min ago</div>
      </div>
      <!-- Rider 4 offline -->
      <div class="mem-row">
        <div class="m-av" style="background:#1e1e2e;">
          MC
          <div class="st-dot st-off"></div>
        </div>
        <div style="flex:1;">
          <div class="m-name">Mike Chen</div>
          <div class="m-bike">Honda CB500X</div>
        </div>
        <div class="m-tag t-off">Offline</div>
      </div>
    </div>

    <!-- Mini group map -->
    <div class="mini-map">
      <svg width="100%" height="148" xmlns="http://www.w3.org/2000/svg">
        <defs><pattern id="gm" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="white" stroke-width="0.35"/></pattern></defs>
        <rect width="100%" height="148" fill="url(#gm)" opacity="0.2"/>
        <!-- Road -->
        <path d="M35,128 Q90,100 132,75 Q175,50 225,28" stroke="#1e2a50" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.5"/>
        <!-- Route line -->
        <path d="M35,128 Q90,100 132,75 Q175,50 225,28" stroke="#3b82f6" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.75"/>
        <!-- Me -->
        <circle cx="35" cy="128" r="7" fill="#0d0d16" stroke="#fff" stroke-width="2.5"/>
        <text x="35" y="131.5" text-anchor="middle" font-size="7" font-weight="800" fill="white" font-family="sans-serif">ME</text>
        <!-- RK -->
        <circle cx="105" cy="88" r="6" fill="#2563eb" stroke="#93c5fd" stroke-width="1.8"/>
        <text x="105" y="91.5" text-anchor="middle" font-size="6.5" font-weight="800" fill="white" font-family="sans-serif">RK</text>
        <!-- SM -->
        <circle cx="142" cy="68" r="6" fill="#059669" stroke="#6ee7b7" stroke-width="1.8"/>
        <text x="142" y="71.5" text-anchor="middle" font-size="6.5" font-weight="800" fill="white" font-family="sans-serif">SM</text>
        <!-- AV (stale, gray) -->
        <circle cx="188" cy="44" r="5.5" fill="#44445a" stroke="#9ca3af" stroke-width="1.5"/>
        <text x="188" y="47.5" text-anchor="middle" font-size="6" font-weight="800" fill="white" font-family="sans-serif">AV</text>
        <!-- Destination -->
        <circle cx="225" cy="28" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/>
        <!-- Path to destination pin -->
        <path d="M225,18 Q229,11 225,5 Q221,11 225,18Z" fill="#ef4444" stroke="#fff" stroke-width="1"/>
      </svg>
      <div class="mm-label">Live Group Map</div>
      <div class="mm-live"><div class="mm-dot"></div> 4 Live</div>
    </div>
  </div>
</div>
</body>
</html>
