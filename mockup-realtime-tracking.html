<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RideSynk – Live Tracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap');

.phone{width:280px;height:580px;background:#0d0d16;border-radius:48px;border:2.5px solid #252535;position:relative;overflow:hidden;box-shadow:0 50px 120px rgba(0,0,0,0.95),0 0 0 1px #1a1a28,inset 0 1px 0 rgba(255,255,255,0.07),0 0 80px rgba(37,99,235,0.12);}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:26px;background:#0d0d16;border-radius:0 0 16px 16px;z-index:100;border:2.5px solid #252535;border-top:none;}
.phone-inner{width:100%;height:100%;overflow:hidden;border-radius:46px;position:relative;}

/* map */
.map{position:absolute;inset:0;background:linear-gradient(160deg,#1a2744 0%,#1e3354 45%,#16253d 100%);}
.map-grid{position:absolute;inset:0;opacity:0.09;}

/* status bar */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:34px 22px 0;font-size:11px;font-weight:700;color:#fff;position:absolute;top:0;left:0;right:0;z-index:50;}

/* nav banner */
.nav-banner{position:absolute;top:60px;left:0;right:0;background:#2563eb;padding:10px 18px;display:flex;align-items:center;gap:11px;z-index:25;}
.nb-arrow{width:32px;height:32px;background:rgba(255,255,255,0.18);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.nb-t1{font-size:11px;font-weight:800;color:#fff;}
.nb-t2{font-size:9px;color:rgba(255,255,255,0.72);margin-top:2px;}

/* top bar */
.topbar{position:absolute;top:116px;left:15px;right:15px;z-index:20;}
.trip-pill{background:rgba(13,13,22,0.93);border-radius:13px;padding:9px 14px;backdrop-filter:blur(12px);margin-bottom:6px;}
.trip-name{font-size:12px;font-weight:800;color:#fff;}
.stats{display:flex;gap:6px;}
.stat{flex:1;background:rgba(13,13,22,0.88);border-radius:11px;padding:7px 5px;text-align:center;backdrop-filter:blur(10px);}
.stat .lbl{font-size:8px;color:#60608a;}
.stat .val{font-size:11px;font-weight:800;color:#fff;margin-top:2px;}

/* rider dots */
.rdot{position:absolute;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;box-shadow:0 3px 14px rgba(0,0,0,0.6);z-index:20;}
.rdot .gdot{position:absolute;bottom:-2px;right:-2px;border-radius:50%;border:2px solid #0d0d16;}
.pulse{position:absolute;inset:-7px;border-radius:50%;border:2.5px solid;animation:pr 2s ease-out infinite;opacity:0;}
@keyframes pr{0%{transform:scale(0.8);opacity:0.7}100%{transform:scale(1.9);opacity:0;}}

/* map controls */
.mctrl{position:absolute;right:15px;display:flex;flex-direction:column;gap:6px;z-index:20;}
.mc{width:36px;height:36px;background:rgba(13,13,22,0.92);border-radius:10px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);color:#fff;font-size:16px;font-weight:600;}

/* sos button */
.sos-btn{position:absolute;bottom:185px;right:15px;width:48px;height:48px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;border:2.5px solid rgba(255,255,255,0.3);box-shadow:0 0 0 6px rgba(220,38,38,0.2),0 8px 24px rgba(220,38,38,0.55);z-index:25;letter-spacing:0.5px;}

/* bottom panel */
.panel{position:absolute;bottom:0;left:0;right:0;background:#0d0d16;border-radius:24px 24px 0 0;border-top:1px solid #1e1e2e;z-index:30;}
.drag{width:38px;height:3.5px;background:#252535;border-radius:2px;margin:10px auto 0;}
.tabs{display:flex;padding:9px 18px 0;border-bottom:1px solid #1a1a28;}
.tab{flex:1;text-align:center;font-size:10px;font-weight:700;color:#505070;padding-bottom:8px;position:relative;}
.tab.on{color:#fff;}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2.5px;background:#ff2d20;border-radius:2px;}
.timeline{padding:14px 18px 12px;position:relative;}
.spine{position:absolute;left:24px;top:18px;bottom:12px;width:2px;background:linear-gradient(to bottom,#fff,#2563eb,#ef4444);opacity:0.3;border-radius:2px;}
.tl-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.tl-row:last-child{margin-bottom:0;}
.tl-d{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;z-index:1;}
.tl-d.done{background:#fff;}
.tl-d.curr{background:#2563eb;box-shadow:0 0 10px rgba(59,130,246,0.85);}
.tl-d.end{background:#ef4444;}
.t1{font-size:10.5px;font-weight:700;color:#fff;}
.t2{font-size:8.5px;color:#505070;margin-top:2px;}
.t-eta{font-size:8px;font-weight:800;color:#3b82f6;background:rgba(59,130,246,0.12);padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block;}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-inner">
    <!-- Map -->
    <div class="map">
      <svg class="map-grid" width="280" height="580" xmlns="http://www.w3.org/2000/svg">
        <defs><pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0L0 0 0 24" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs>
        <rect width="280" height="580" fill="url(#g)"/>
      </svg>
      <!-- Roads -->
      <svg style="position:absolute;inset:0;" width="280" height="580">
        <path d="M50,520 Q55,430 70,370 Q90,290 120,240 Q155,185 185,160 Q215,138 218,95" stroke="#2a3560" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.5"/>
        <path d="M50,520 Q55,430 70,370 Q90,290 120,240 Q155,185 185,160 Q215,138 218,95" stroke="#1e2a50" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.3"/>
        <!-- Alt road -->
        <path d="M50,520 Q90,470 115,420 Q145,360 160,300 Q175,240 200,200 Q218,170 218,95" stroke="#232850" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.4"/>
        <!-- Alt route dashed -->
        <path d="M50,520 Q90,470 115,420 Q145,360 160,300 Q175,240 200,200 Q218,170 218,95" stroke="#4a5580" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="8 6" opacity="0.65"/>
        <!-- Main route -->
        <path d="M50,520 Q55,430 70,370 Q90,290 120,240 Q155,185 185,160 Q215,138 218,95" stroke="#3b82f6" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.9"/>
        <!-- Start -->
        <circle cx="50" cy="520" r="7" fill="#22c55e" stroke="#fff" stroke-width="2.5"/>
        <!-- End -->
        <circle cx="218" cy="95" r="7" fill="#ef4444" stroke="#fff" stroke-width="2.5"/>
        <!-- Destination pin -->
        <path d="M218,75 Q225,65 218,55 Q211,65 218,75Z" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Status bar -->
    <div class="sbar">
      <span>9:41</span>
      <div style="display:flex;gap:5px;align-items:center;">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="white"><rect x="0" y="6" width="3" height="4" rx="0.6"/><rect x="3.5" y="4" width="3" height="6" rx="0.6"/><rect x="7" y="2" width="3" height="8" rx="0.6"/><rect x="10.5" y="0" width="3" height="10" rx="0.6"/></svg>
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5.5A8.5 5.5 0 0 1 13 5.5" stroke="white" stroke-width="1.3"/><path d="M3.5 7.5A5 3 0 0 1 10.5 7.5" stroke="white" stroke-width="1.3"/><circle cx="7" cy="9.5" r="1.2" fill="white"/></svg>
        <span style="font-size:10px;font-weight:700;">84%</span>
      </div>
    </div>

    <!-- Nav banner -->
    <div class="nav-banner">
      <div class="nb-arrow">↱</div>
      <div>
        <div class="nb-t1">Turn right on NH-48</div>
        <div class="nb-t2">In 400 m · 12 min to next stop</div>
      </div>
    </div>

    <!-- Top bar -->
    <div class="topbar">
      <div class="trip-pill"><div class="trip-name">Goa Weekend Ride 🏍️</div></div>
      <div class="stats">
        <div class="stat"><div class="lbl">Distance</div><div class="val">142 km</div></div>
        <div class="stat"><div class="lbl">ETA</div><div class="val">2h 14m</div></div>
        <div class="stat"><div class="lbl">Riders Live</div><div class="val">4/5</div></div>
      </div>
    </div>

    <!-- Rider: ME -->
    <div class="rdot" style="width:38px;height:38px;font-size:10px;left:28px;top:448px;background:#0d0d16;">
      ME
      <div class="gdot" style="width:12px;height:12px;background:#22c55e;"></div>
      <div class="pulse" style="border-color:#fff;"></div>
    </div>
    <!-- Rider RK -->
    <div class="rdot" style="width:36px;height:36px;font-size:10px;left:95px;top:355px;background:#2563eb;border-color:#93c5fd;">
      RK
      <div class="gdot" style="width:11px;height:11px;background:#22c55e;"></div>
      <div class="pulse" style="border-color:#93c5fd;animation-delay:0.4s;"></div>
    </div>
    <!-- Rider SM -->
    <div class="rdot" style="width:34px;height:34px;font-size:10px;left:128px;top:298px;background:#059669;border-color:#6ee7b7;">
      SM
      <div class="gdot" style="width:11px;height:11px;background:#22c55e;"></div>
    </div>
    <!-- Rider AV -->
    <div class="rdot" style="width:34px;height:34px;font-size:10px;left:158px;top:248px;background:#7c3aed;border-color:#c4b5fd;">
      AV
      <div class="gdot" style="width:11px;height:11px;background:#facc15;"></div>
      <div class="pulse" style="border-color:#c4b5fd;animation-delay:0.8s;"></div>
    </div>

    <!-- Map controls -->
    <div class="mctrl" style="top:42%;right:15px;">
      <div class="mc">⊞</div>
      <div class="mc" style="font-size:13px;">◎</div>
      <div class="mc">+</div>
      <div class="mc" style="font-size:20px;padding-bottom:4px;">−</div>
    </div>

    <!-- SOS -->
    <div class="sos-btn">SOS</div>

    <!-- Bottom panel -->
    <div class="panel" style="height:178px;">
      <div class="drag"></div>
      <div class="tabs">
        <div class="tab on">Plan</div>
        <div class="tab">Members (5)</div>
        <div class="tab">Chat</div>
      </div>
      <div class="timeline">
        <div class="spine"></div>
        <div class="tl-row">
          <div class="tl-d done"></div>
          <div><div class="t1">Pune, Maharashtra</div><div class="t2">Start Point</div><div class="t-eta">07:00 AM</div></div>
        </div>
        <div class="tl-row">
          <div class="tl-d curr"></div>
          <div><div class="t1">Kolhapur Stop</div><div class="t2">Stop 1 · Current</div></div>
        </div>
        <div class="tl-row">
          <div class="tl-d end"></div>
          <div><div class="t1">Panaji, Goa</div><div class="t2">End Point</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
